alerts:
  - name: critical_error_rate
    severity: P1
    condition: error_rate_pct > 5 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate
    description: "Tỷ lệ lỗi vượt quá 5% trong 5 phút. Ảnh hưởng trực tiếp đến người dùng."

  - name: high_latency_p95
    severity: P2
    condition: latency_p95_ms > 1500 for 15m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95
    description: "Độ trễ P95 vượt ngưỡng 1.5s. Hệ thống đang chậm bất thường so với mức trung bình 850ms."

  - name: token_burn_spike
    severity: P2
    condition: tokens_out_per_min > 50000 for 10m
    type: resource-based
    owner: finops-owner
    runbook: docs/alerts.md#4-token-burn-spike
    description: "Số lượng token output tăng đột biến. Cần kiểm tra xem có vòng lặp vô tận hoặc tấn công DoS không."

  - name: cost_budget_spike
    severity: P2
    condition: hourly_cost_usd > 5.0 for 15m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-budget-spike
    description: "Chi phí theo giờ vượt gấp đôi bình thường."
